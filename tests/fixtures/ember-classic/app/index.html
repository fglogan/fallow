    <!--
      The `{{rootURL}}` and `{{config.assetsPath}}` placeholders are
      Handlebars expressions that ember-cli substitutes at build time. They
      are never resolvable as on-disk specifiers, so plow's HTML asset
      scanner (`crate::extract::html::is_template_placeholder`) skips them
      at extraction time; they never enter the import graph and cannot
      surface as `unresolved-import`.
    -->
    <script src="{{rootURL}}assets/vendor.js"></script>
    <script src="{{config.assetsPath}}assets/ember-classic-fixture.js"></script>
  </body>
